# Attack Definition Schema
# Public schema for sanitized attack metadata. No payload, detection, scoring,
# priority, reproduction, or model-specific fields are included.

---

attack:
  type: object
  required:
    - id
    - name
    - category
    - description
    - severity
    - owasp
  properties:
    id:
      type: string
      pattern: "^[A-Z]{2,4}-\\d{3}$"
    name:
      type: string
      maxLength: 100
    category:
      type: string
      enum:
        - prompt_injection
        - system_prompt_leakage
        - jailbreaks
        - vision_multimodal
        - excessive_agency
        - multi_turn
        - sensitive_disclosure
        - supply_chain
        - vector_embedding
        - improper_output
        - unbounded_consumption
        - misinformation
        - memory_context_poisoning
        - unexpected_code_execution
        - inter_agent_communication
        - human_trust_exploitation
    description:
      type: string
      minLength: 50
    severity:
      type: string
      enum:
        - critical
        - high
        - medium
        - low
        - info
    owasp:
      type: string
      pattern: "^LLM(0[1-9]|10)$"
    atlas:
      type: string
      pattern: "^AML\\.T\\d{4}(\\.\\d{3})?$"
    framework_mappings:
      type: object
      properties:
        owasp_llm:
          type: array
          items:
            type: string
        owasp_agentic:
          type: array
          items:
            type: string
        owasp_mcp:
          type: array
          items:
            type: string
        mitre_atlas:
          type: array
          items:
            type: string
    remediation_summary:
      type: string

# Category prefix reference:
#   PI   = prompt_injection
#   SPL  = system_prompt_leakage
#   JB   = jailbreaks
#   VI   = vision_multimodal
#   EA   = excessive_agency
#   MT   = multi_turn
#   SID  = sensitive_disclosure
#   SC   = supply_chain
#   VE   = vector_embedding
#   IOH  = improper_output
#   UC   = unbounded_consumption
#   MIS  = misinformation
#   CTX  = memory_context_poisoning
#   UCE  = unexpected_code_execution
#   IAC  = inter_agent_communication
#   HTE  = human_trust_exploitation
