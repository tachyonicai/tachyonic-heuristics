# Attack Chain Ontology
# Cross-category attack paths showing how attacks enable other attacks.
# Each chain describes a multi-stage attack scenario.
#
# Relationship types:
#   enables    — success at stage N makes stage N+1 possible
#   bypasses   — this attack crosses a modality or layer boundary to avoid defenses
#   informs    — output of this stage provides intelligence for the next
#
# ESF Phase: 2 (Relate)

chains:

  - id: CHAIN-001
    name: "Injection to Prompt Leakage to Targeted Jailbreak"
    description: >
      Attacker uses prompt injection to extract the system prompt,
      then uses knowledge of the system prompt's constraints to craft
      a targeted jailbreak that exploits specific guardrail weaknesses.
    stages:
      - step: 1
        attack_category: "prompt_injection"
        attack_ids: ["PI-001", "PI-002", "PI-003"]
        relationship: "enables"
        objective: "Gain control of model output behavior"
      - step: 2
        attack_category: "system_prompt_leakage"
        attack_ids: ["SPL-001", "SPL-002", "SPL-003"]
        relationship: "informs"
        objective: "Extract system prompt to understand constraints and architecture"
      - step: 3
        attack_category: "jailbreaks"
        attack_ids: ["JB-001", "JB-002"]
        relationship: "enables"
        objective: "Bypass safety guardrails using knowledge of specific constraints"
    trust_boundary_crossed: "User input → Model instruction space"
    root_cause: "Instruction/data channel conflation"

  - id: CHAIN-002
    name: "Jailbreak to Tool Abuse to Privilege Escalation"
    description: >
      After bypassing safety guardrails via jailbreak, attacker
      manipulates the agent into misusing its tool capabilities,
      escalating privileges beyond the agent's intended scope.
    stages:
      - step: 1
        attack_category: "jailbreaks"
        attack_ids: ["JB-001", "JB-005", "JB-010"]
        relationship: "enables"
        objective: "Bypass safety guardrails"
      - step: 2
        attack_category: "excessive_agency"
        attack_ids: ["EA-001", "EA-003", "EA-005"]
        relationship: "enables"
        objective: "Misuse tool capabilities beyond intended scope"
      - step: 3
        attack_category: "excessive_agency"
        attack_ids: ["EA-007", "EA-009"]
        relationship: "enables"
        objective: "Escalate privileges via tool chaining"
    trust_boundary_crossed: "Agent → Tool interface"
    root_cause: "Capability scope is policy-enforced, not structurally enforced"

  - id: CHAIN-003
    name: "RAG Poisoning to Indirect Injection"
    description: >
      Attacker poisons documents in the RAG knowledge base with
      embedded instructions. When retrieved, these instructions
      are treated as trusted context, achieving indirect prompt injection.
    stages:
      - step: 1
        attack_category: "vector_embedding"
        attack_ids: ["VE-001", "VE-003"]
        relationship: "enables"
        objective: "Inject malicious content into the retrieval pipeline"
      - step: 2
        attack_category: "prompt_injection"
        attack_ids: ["PI-010", "PI-015"]
        relationship: "enables"
        objective: "Achieve instruction injection via retrieved content"
    trust_boundary_crossed: "External document → Model context window"
    root_cause: "Retrieved content is treated as trusted without provenance verification"

  - id: CHAIN-004
    name: "Vision-based Injection Bypass"
    description: >
      Attacker embeds malicious instructions in images (typographic
      injection, steganographic payloads) that bypass text-based
      input validation entirely, achieving prompt injection through
      a different modality.
    stages:
      - step: 1
        attack_category: "vision_multimodal"
        attack_ids: ["VI-001", "VI-003", "VI-005"]
        relationship: "bypasses"
        objective: "Deliver injection payload via image modality"
      - step: 2
        attack_category: "prompt_injection"
        attack_ids: ["PI-001"]
        relationship: "enables"
        objective: "Override model behavior via image-extracted instructions"
    trust_boundary_crossed: "Image input → Text instruction space"
    root_cause: "Input validation operates per-modality without cross-modal consistency"

  - id: CHAIN-005
    name: "Multi-Turn Context Accumulation to Escalation"
    description: >
      Attacker builds benign-appearing context across multiple turns,
      establishing implicit trust. Once sufficient trusted context
      exists, a final turn exploits the accumulated context for
      privilege escalation or goal hijacking.
    stages:
      - step: 1
        attack_category: "multi_turn_manipulation"
        attack_ids: ["MT-001", "MT-003"]
        relationship: "enables"
        objective: "Build trusted context over multiple benign-appearing turns"
      - step: 2
        attack_category: "excessive_agency"
        attack_ids: ["EA-001", "EA-007"]
        relationship: "enables"
        objective: "Exploit accumulated context for privilege escalation"
    trust_boundary_crossed: "Conversation history → Current action authorization"
    root_cause: "Trust model does not decay with context diversity or time"

  - id: CHAIN-006
    name: "Output Injection to Downstream Compromise"
    description: >
      Attacker crafts inputs that cause the model to generate output
      containing executable payloads (XSS, SQL injection, command
      injection). When downstream systems consume the model's output
      without sanitization, the payload executes.
    stages:
      - step: 1
        attack_category: "prompt_injection"
        attack_ids: ["PI-001", "PI-005"]
        relationship: "enables"
        objective: "Control model output content"
      - step: 2
        attack_category: "improper_output_handling"
        attack_ids: ["IOH-001", "IOH-003", "IOH-005"]
        relationship: "enables"
        objective: "Execute payload in downstream system via unsanitized model output"
    trust_boundary_crossed: "Model output → Downstream system input"
    root_cause: "Model output is trusted by downstream systems without context-appropriate encoding"

  - id: CHAIN-007
    name: "Retrieval Poisoning to Context Poisoning to Tool Misuse"
    description: >
      Attacker injects malicious content into the RAG knowledge base.
      When retrieved, the content plants instructions in the agent's
      context that cause it to misuse tools on subsequent actions.
    stages:
      - step: 1
        attack_category: "vector_embedding"
        attack_ids: ["VE-001", "VE-009", "VE-010"]
        relationship: "enables"
        objective: "Inject attacker-controlled content into retrieval pipeline"
      - step: 2
        attack_category: "memory_context_poisoning"
        attack_ids: ["CTX-005"]
        relationship: "enables"
        objective: "Plant instructions in agent context via retrieved content"
      - step: 3
        attack_category: "excessive_agency"
        attack_ids: ["EA-001", "EA-013"]
        relationship: "enables"
        objective: "Exploit poisoned context to invoke tools outside scope"
    trust_boundary_crossed: "Retrieval store → Agent context → Tool interface"
    root_cause: "Retrieved content is treated as trusted instructions without provenance verification"

  - id: CHAIN-008
    name: "Tool Schema Poisoning to MCP Scope Escalation to Privileged Action"
    description: >
      Attacker modifies tool schema definitions (via supply chain or
      shadow registration) to expand the agent's effective capabilities,
      then exploits the expanded scope for privileged operations.
    stages:
      - step: 1
        attack_category: "supply_chain"
        attack_ids: ["SC-009", "EA-014"]
        relationship: "enables"
        objective: "Register or modify tool definitions with expanded capabilities"
      - step: 2
        attack_category: "excessive_agency"
        attack_ids: ["EA-013"]
        relationship: "enables"
        objective: "Agent operates with expanded scope from modified tool definitions"
      - step: 3
        attack_category: "excessive_agency"
        attack_ids: ["EA-007"]
        relationship: "enables"
        objective: "Execute privileged actions through expanded tool access"
    trust_boundary_crossed: "Tool registry → Agent capability set → Target system"
    root_cause: "Tool definitions are accepted without integrity verification"

  - id: CHAIN-009
    name: "Memory Poisoning to Stale Trust Replay to Data Exfiltration"
    description: >
      Attacker plants false authorization in persistent memory. In a
      later session, the stale authorization is replayed to justify
      data access the attacker was never granted.
    stages:
      - step: 1
        attack_category: "memory_context_poisoning"
        attack_ids: ["CTX-001"]
        relationship: "enables"
        objective: "Plant false authorization claim in persistent memory"
      - step: 2
        attack_category: "memory_context_poisoning"
        attack_ids: ["CTX-004"]
        relationship: "enables"
        objective: "Replay stale authorization from previous session"
      - step: 3
        attack_category: "sensitive_disclosure"
        attack_ids: ["SID-004", "SID-005"]
        relationship: "enables"
        objective: "Extract data using replayed authorization"
    trust_boundary_crossed: "Memory store → Authorization layer → Data store"
    root_cause: "Authorization decisions are cached in agent memory without expiration or re-validation"

  - id: CHAIN-010
    name: "False Security State to Human Approval to Privileged Action"
    description: >
      Agent generates a false security assessment (misinformation)
      that convinces a human reviewer to approve an action that
      should have been blocked. Combines misinformation with
      human trust exploitation.
    stages:
      - step: 1
        attack_category: "misinformation"
        attack_ids: ["MIS-003", "MIS-004"]
        relationship: "enables"
        objective: "Generate false security or compliance assessment"
      - step: 2
        attack_category: "misinformation"
        attack_ids: ["MIS-002"]
        relationship: "enables"
        objective: "Human approves action based on false assessment or false completion claim"
        notes: "MIS-002 (false completion) covers the approval manipulation vector. See also CHAIN-013 which uses dedicated HTE attacks."
      - step: 3
        attack_category: "excessive_agency"
        attack_ids: ["EA-007"]
        relationship: "enables"
        objective: "Execute privileged action with human-approved false justification"
    trust_boundary_crossed: "Agent output → Human judgment → Authorization"
    root_cause: "Human reviewers treat agent-generated assessments as authoritative without independent verification"

  - id: CHAIN-011
    name: "Goal Hijack to Approval Bypass to Unexpected Execution"
    description: >
      Attacker hijacks the agent's goal, then exploits the reframed
      objective to bypass approval gates and achieve code execution.
    stages:
      - step: 1
        attack_category: "prompt_injection"
        attack_ids: ["PI-001", "MT-009"]
        relationship: "enables"
        objective: "Redirect agent goal toward attacker objective"
      - step: 2
        attack_category: "excessive_agency"
        attack_ids: ["EA-017"]
        relationship: "enables"
        objective: "Bypass approval by reframing the action as benign"
      - step: 3
        attack_category: "unexpected_code_execution"
        attack_ids: ["UCE-002", "UCE-003"]
        relationship: "enables"
        objective: "Execute attacker code through the reframed operation"
    trust_boundary_crossed: "User intent → Agent goal → Approval gate → Execution"
    root_cause: "Approval gates rely on agent-generated descriptions, not actual operation parameters"

  - id: CHAIN-012
    name: "Inter-Agent Spoofing to Delegated Task Hijack to Credential Misuse"
    description: >
      Attacker spoofs a trusted agent identity, hijacks a delegated task
      to include credential harvesting, then uses harvested credentials
      for unauthorized access.
    stages:
      - step: 1
        attack_category: "inter_agent_communication"
        attack_ids: ["IAC-001"]
        relationship: "enables"
        objective: "Impersonate a trusted agent in the multi-agent system"
      - step: 2
        attack_category: "inter_agent_communication"
        attack_ids: ["IAC-006"]
        relationship: "enables"
        objective: "Hijack delegated task to include credential extraction"
      - step: 3
        attack_category: "sensitive_disclosure"
        attack_ids: ["SID-005"]
        relationship: "enables"
        objective: "Use harvested credentials for unauthorized access"
    trust_boundary_crossed: "Agent identity → Delegation protocol → Credential store"
    root_cause: "Inter-agent messages lack identity verification and integrity checks"

  - id: CHAIN-013
    name: "Human Trust Exploitation to Dangerous Approval to Destructive Action"
    description: >
      Agent generates a deceptive completion report or fake urgency
      that manipulates the human reviewer into approving a destructive
      action they would otherwise reject.
    stages:
      - step: 1
        attack_category: "human_trust_exploitation"
        attack_ids: ["HTE-001", "HTE-005"]
        relationship: "enables"
        objective: "Generate misleading approval prompt or urgency signal"
      - step: 2
        attack_category: "excessive_agency"
        attack_ids: ["EA-018"]
        relationship: "enables"
        objective: "Suppress or bypass confirmation gate"
      - step: 3
        attack_category: "excessive_agency"
        attack_ids: ["EA-007"]
        relationship: "enables"
        objective: "Execute destructive action with obtained approval"
    trust_boundary_crossed: "Agent output → Human judgment → Authorization → Destructive action"
    root_cause: "Human reviewer trusts agent-generated urgency and descriptions without verification"

  - id: CHAIN-014
    name: "Poisoned Skill to Configuration Tampering to Host Execution"
    description: >
      Attacker publishes a poisoned skill that modifies agent configuration
      to weaken sandbox restrictions, then exploits the weakened state
      for host-level code execution.
    stages:
      - step: 1
        attack_category: "supply_chain"
        attack_ids: ["SC-009"]
        relationship: "enables"
        objective: "Install poisoned skill package with hidden capabilities"
      - step: 2
        attack_category: "unexpected_code_execution"
        attack_ids: ["UCE-004"]
        relationship: "enables"
        objective: "Modify agent configuration to weaken sandbox"
      - step: 3
        attack_category: "unexpected_code_execution"
        attack_ids: ["UCE-005"]
        relationship: "enables"
        objective: "Achieve host-level execution through weakened sandbox"
    trust_boundary_crossed: "Skill registry → Agent config → Sandbox → Host"
    root_cause: "Skills can modify agent configuration, and sandbox enforcement is policy-based"

# Summary Statistics
summary:
  total_chains: 14
  categories_involved: 15   # of 17 total categories
  categories_not_yet_chained:
    - "unbounded_consumption"        # UC
    - "data_model_poisoning"         # DMP — mapping only
  common_root_causes:
    - "Instruction/data channel conflation"
    - "Policy-enforced vs. structurally-enforced capability scope"
    - "Cross-modality input validation gaps"
    - "Implicit trust in retrieved or accumulated context"
    - "Unsanitized model output consumed by downstream systems"
    - "Retrieved content treated as trusted without provenance"
    - "Tool definitions accepted without integrity verification"
    - "Authorization cached without expiration or re-validation"
    - "Agent-generated assessments treated as authoritative by human reviewers"
    - "Approval gates rely on agent descriptions, not actual operation parameters"
    - "Inter-agent messages lack identity verification and integrity checks"
    - "Skills can modify agent configuration and weaken sandbox enforcement"
