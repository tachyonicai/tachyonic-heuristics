# Research Papers & References
# Academic sources for attack techniques and success rates

version: "2.0.0"
updated: "2026-04-14"

papers:
  # Prompt Injection
  - id: "pleak"
    title: "PLeak: Prompt Leaking Attacks against Large Language Model Applications"
    arxiv: "2405.06823"
    url: "https://arxiv.org/abs/2405.06823"
    year: 2024
    findings:
      - "86.2% success rate for system prompt extraction"
      - "Multi-turn optimization improves extraction"
    attacks_using: ["SPL-006", "SPL-007"]

  - id: "simple_adaptive"
    title: "Simple Adaptive Attacks on LLMs"
    arxiv: "2402.05162"
    url: "https://arxiv.org/abs/2402.05162"
    year: 2024
    findings:
      - "97.5% success with Base64 encoding bypass"
      - "Simple techniques often outperform complex attacks"
    attacks_using: ["PI-007"]

  # Jailbreaks
  - id: "gcg"
    title: "Universal and Transferable Adversarial Attacks on Aligned Language Models"
    arxiv: "2307.15043"
    url: "https://arxiv.org/abs/2307.15043"
    year: 2023
    findings:
      - "Adversarial suffixes transfer across models"
      - "White-box optimization creates universal triggers"
    attacks_using: ["JB-017", "JB-018", "JB-019"]

  - id: "autodan"
    title: "AutoDAN: Generating Stealthy Jailbreak Prompts on Aligned Large Language Models"
    arxiv: "2310.04451"
    url: "https://arxiv.org/abs/2310.04451"
    year: 2023
    findings:
      - "Automated jailbreak generation"
      - "Hierarchical genetic algorithm"
    attacks_using: ["JB-018"]

  - id: "rolebreaker"
    title: "RoleBreaker: Automated Jailbreak Attacks via Role-Playing"
    arxiv: "2402.16622"
    url: "https://arxiv.org/abs/2402.16622"
    year: 2024
    findings:
      - "87.3% success rate"
      - "Persona-based attacks"
    attacks_using: ["JB-008"]

  - id: "crescendo"
    title: "Crescendo: Multi-Turn Jailbreak Attack"
    url: "https://crescendo-the-multiturn-jailbreak.github.io/"
    year: 2024
    findings:
      - "90%+ success in under 10 turns"
      - "Gradual escalation bypasses safety"
    attacks_using: ["JB-009"]

  # Vision Attacks
  - id: "figstep"
    title: "FigStep: Jailbreaking Large Vision-language Models via Typographic Visual Prompts"
    arxiv: "2311.05608"
    url: "https://arxiv.org/abs/2311.05608"
    year: 2023
    findings:
      - "82.5% success rate"
      - "Text rendered in images bypasses filters"
    attacks_using: ["VI-001", "VI-002"]

  - id: "camo"
    title: "Cross-Modal Obfuscation Attacks on Vision-Language Models"
    arxiv: "2506.16760"
    url: "https://arxiv.org/html/2506.16760v1"
    year: 2025
    findings:
      - "Split payload across modalities"
      - "Neither text nor image alone is harmful"
    attacks_using: ["VI-004"]

  - id: "fc_attack"
    title: "FC-Attack: Jailbreaking VLMs via Flowchart Images"
    arxiv: "2502.21059"
    url: "https://arxiv.org/abs/2502.21059"
    year: 2025
    findings:
      - "4% to 28% improvement with font changes"
      - "Flowchart format evades detection"
    attacks_using: ["VI-005", "VI-006", "VI-007"]

  - id: "vlm_oncology"
    title: "Prompt Injection Attacks on VLMs in Clinical Oncology"
    journal: "Nature Communications"
    url: "https://www.nature.com/articles/s41467-024-55631-x"
    year: 2024
    findings:
      - "All tested VLMs susceptible"
      - "Medical imaging vulnerable to adversarial attacks"
    attacks_using: ["VI-008"]

  # Multi-Turn
  - id: "minja"
    title: "MINJA: Memory Injection Attacks on LLM Agents"
    arxiv: "2403.14607"
    url: "https://arxiv.org/abs/2403.14607"
    year: 2024
    findings:
      - "Memory systems can be poisoned"
      - "Persistent context manipulation"
    attacks_using: ["MT-004"]

  # Supply Chain
  - id: "langgrinch"
    title: "LangGrinch: Critical LangChain Vulnerability CVE-2025-68664"
    url: "https://cyata.ai/blog/langgrinch-langchain-core-cve-2025-68664/"
    cve: "CVE-2025-68664"
    year: 2025
    findings:
      - "847M downloads affected"
      - "Serialization injection via LLM responses"
    attacks_using: ["SC-001", "SC-002"]

  - id: "mcp_security"
    title: "MCP Security Vulnerabilities"
    url: "https://www.practical-devsecops.com/mcp-security-vulnerabilities/"
    year: 2025
    findings:
      - "13,000+ MCP servers with no verification"
      - "Tool poisoning, credential theft"
    attacks_using: ["EA-004", "EA-005", "EA-006"]

# Benchmarks
benchmarks:
  - name: "HarmBench"
    url: "https://www.harmbench.org/"
    description: "Standardized evaluation of LLM safety"

  - name: "JailbreakBench"
    url: "https://jailbreakbench.github.io/"
    description: "Jailbreak attack evaluation"

  - name: "AgentDojo"
    url: "https://openreview.net/forum?id=m1YYAQjO3w"
    description: "Prompt injection attacks and defenses against tool-calling agents"
    focus: ["prompt_injection", "excessive_agency"]

  - name: "WASP"
    url: "https://openreview.net/forum?id=Ip1cCUAllL"
    description: "Web-agent prompt injection benchmark (86% partial attack success)"
    focus: ["prompt_injection", "vision_injection"]

  - name: "DoomArena"
    url: "https://openreview.net/forum?id=GanmYQ0RpE"
    description: "Multi-path threat model evaluation (malicious user/environment/tool/mixed)"
    focus: ["prompt_injection", "multi_turn", "excessive_agency"]

  - name: "MCP-Radar"
    url: "https://openreview.net/forum?id=I0bbPcMeCj"
    description: "MCP tool use benchmark (utility measurement, not security)"
    focus: ["excessive_agency"]

  - name: "A2ASecBench"
    url: "https://openreview.net/forum?id=LfdFnakqGJ"
    description: "Protocol-aware security benchmark for agent-to-agent systems"
    focus: ["inter_agent_communication"]

  - name: "CyberGym"
    url: "https://openreview.net/forum?id=2YvbLQEdYt"
    description: "Cyber-capable agent evaluation on real-world vulnerabilities"
    focus: ["unexpected_code_execution", "excessive_agency"]

  - name: "SEC-bench"
    url: "https://openreview.net/forum?id=QQhQIqons0"
    description: "Security workflow evaluation for agents"
    focus: ["unexpected_code_execution", "improper_output"]

  - name: "CyberSecEval 4"
    url: "https://meta-llama.github.io/PurpleLlama/CyberSecEval/"
    description: "Meta's vulnerability exploitation evaluation suite"
    focus: ["improper_output", "excessive_agency"]

