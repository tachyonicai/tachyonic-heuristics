    - JB-004  # Token Manipulation
    - JB-005  # Multi-Language Jailbreak
    - JB-006  # Emotional Manipulation
    - JB-007  # Authority Impersonation
    - JB-008  # Nested Roleplay
    - JB-009  # Opposite Day / Inversion
    - JB-010  # Cognitive Hacking
    - JB-011  # Crescendo Attack
    - JB-012  # Code Interpreter Jailbreak
    - JB-013  # System Prompt Overwrite
    - JB-014  # Narrative Embedding
    - JB-015  # Technical Reframing
    - JB-016  # Suffix Attack
    - JB-017  # Prompt Injection Chain
    - JB-018  # Virtual Scenario Hypnosis
    - JB-019  # Reward Hacking
    - JB-020  # Distraction Jailbreak
    - JB-021  # Fine-Tuning Exploitation
    - JB-022  # API-Level Bypass
  total: 22

LLM10_unbounded_consumption:
  name: "Unbounded Consumption"
  description: >
    LLM applications allow excessive resource consumption, leading
    to denial of service or economic harm.
  attacks:
    - UC-001  # Context Window Exhaustion
    - UC-002  # Recursive Generation Attack
  total: 2
