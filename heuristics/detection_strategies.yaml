# Detection Strategies
# High-level "what to look for" per attack chain.
# Strategies describe observable signals, NOT specific detection logic.
#
# ESF Phase: 3 (Guess) — Strategic Layer
# See ontology/attack_chains.yaml for the attack chains referenced here.

strategies:

  - chain_id: "CHAIN-001"
    chain_name: "Injection to Prompt Leakage to Targeted Jailbreak"
    detection_points:
      - stage: 1
        signal: "Input contains instruction-like content directed at the model's behavior"
        monitor_at: "Input validation layer"
      - stage: 2
        signal: "Output contains fragments of system prompt content or internal configuration"
        monitor_at: "Output filtering layer"
      - stage: 3
        signal: "Subsequent input references specific system constraints or internal terminology"
        monitor_at: "Input validation layer, with session context"

  - chain_id: "CHAIN-002"
    chain_name: "Jailbreak to Tool Abuse to Privilege Escalation"
    detection_points:
      - stage: 1
        signal: "Input uses persona framing, hypothetical scenarios, or safety bypass patterns"
        monitor_at: "Input validation layer"
      - stage: 2
        signal: "Tool invocations with parameters outside expected ranges or scope"
        monitor_at: "Agent-tool interface (trust boundary)"
      - stage: 3
        signal: "Sequential tool calls that accumulate privileges beyond initial grant"
        monitor_at: "Agent capability tracker"

  - chain_id: "CHAIN-003"
    chain_name: "RAG Poisoning to Indirect Injection"
    detection_points:
      - stage: 1
        signal: "Retrieved documents contain anomalous instruction density or directive language"
        monitor_at: "Retrieval pipeline, before context insertion"
      - stage: 2
        signal: "Model behavior changes after specific document retrieval"
        monitor_at: "Output comparison layer (pre/post retrieval)"

  - chain_id: "CHAIN-004"
    chain_name: "Vision-based Injection Bypass"
    detection_points:
      - stage: 1
        signal: "Text extracted from images contains instruction-like patterns"
        monitor_at: "Multimodal input processing, after OCR/vision extraction"
      - stage: 2
        signal: "Model behavior changes consistent with instruction override following image input"
        monitor_at: "Output behavioral analysis"

  - chain_id: "CHAIN-005"
    chain_name: "Multi-Turn Context Accumulation to Escalation"
    detection_points:
      - stage: 1
        signal: "Extended sequence of benign-appearing tool calls followed by a privilege-sensitive request"
        monitor_at: "Session-level behavioral analysis"
      - stage: 2
        signal: "Privilege level of requested action exceeds maximum of all previous actions in session"
        monitor_at: "Agent capability tracker, with temporal context"

  - chain_id: "CHAIN-006"
    chain_name: "Output Injection to Downstream Compromise"
    detection_points:
      - stage: 1
        signal: "Model output contains patterns associated with code injection (script tags, SQL syntax, shell commands)"
        monitor_at: "Output sanitization layer"
      - stage: 2
        signal: "Downstream system receives model output without context-appropriate encoding"
        monitor_at: "Output-to-downstream interface"

  - chain_id: "CHAIN-007"
    chain_name: "Retrieval Poisoning to Context Poisoning to Tool Misuse"
    detection_points:
      - stage: 1
        signal: "Retrieved content contains instruction-like patterns or anomalous directive density"
        monitor_at: "Retrieval pipeline, after vector search, before context insertion"
      - stage: 2
        signal: "Agent context contains directives not originating from system prompt or user input"
        monitor_at: "Context assembly layer"
      - stage: 3
        signal: "Tool invocations with parameters or scope inconsistent with user request"
        monitor_at: "Agent-tool interface"

  - chain_id: "CHAIN-008"
    chain_name: "Tool Schema Poisoning to MCP Scope Escalation to Privileged Action"
    detection_points:
      - stage: 1
        signal: "Tool definitions changed since last verified state, or new tools appear that were not in the pinned manifest"
        monitor_at: "Tool registry, on discovery or refresh"
      - stage: 2
        signal: "Agent invokes tools or capabilities not present in its initialized scope"
        monitor_at: "Agent capability tracker"
      - stage: 3
        signal: "Privileged action executed through newly available tool"
        monitor_at: "Action authorization layer"

  - chain_id: "CHAIN-009"
    chain_name: "Memory Poisoning to Stale Trust Replay to Data Exfiltration"
    detection_points:
      - stage: 1
        signal: "Memory write contains authorization claims or privilege assertions from user-role input"
        monitor_at: "Memory write layer"
      - stage: 2
        signal: "Authorization derived from stored context rather than fresh validation"
        monitor_at: "Authorization layer, on each privileged action"
      - stage: 3
        signal: "Data access or exfiltration using authorization not verified in current session"
        monitor_at: "Data access layer"

  - chain_id: "CHAIN-010"
    chain_name: "False Security State to Human Approval to Privileged Action"
    detection_points:
      - stage: 1
        signal: "Agent generates definitive security or compliance assessment without tool-backed verification"
        monitor_at: "Output validation layer"
      - stage: 2
        signal: "Human approval granted based solely on agent-generated assessment"
        monitor_at: "Human-in-the-loop approval interface"
      - stage: 3
        signal: "Privileged action executed immediately after agent-generated assessment"
        monitor_at: "Action authorization layer, with temporal context"
