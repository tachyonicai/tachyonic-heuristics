# Remediation by OWASP LLM Top 10 2025
# Shared remediation guidance referenced by attacks

version: "2.0.0"
updated: "2026-04-14"

LLM01_prompt_injection:
  name: "Prompt Injection"
  summary: "Implement strict input/output boundaries and instruction hierarchy"
  controls:
    - id: "PI-C1"
      name: "Instruction Hierarchy"
      description: "Use delimiter tokens that users cannot access"
      implementation: "Wrap system instructions in special tokens"
    - id: "PI-C2"
      name: "Input Validation"
      description: "Sanitize and validate all user inputs"
      implementation: "Filter known injection patterns before LLM"
    - id: "PI-C3"
      name: "Output Filtering"
      description: "Validate LLM outputs before execution"
      implementation: "Check for command injection in tool calls"
  references:
    - "https://owasp.org/www-project-top-10-for-large-language-model-applications/"

LLM02_sensitive_disclosure:
  name: "Sensitive Information Disclosure"
  summary: "Prevent leakage of PII, credentials, and confidential data"
  controls:
    - id: "SD-C1"
      name: "Data Classification"
      description: "Tag sensitive data in prompts and context"
      implementation: "Use metadata to mark PII/secrets"
    - id: "SD-C2"
      name: "Output Scanning"
      description: "Scan responses for sensitive patterns"
      implementation: "Regex for SSN, credit cards, API keys"
    - id: "SD-C3"
      name: "Redaction"
      description: "Automatically redact detected sensitive data"
      implementation: "Replace with [REDACTED] tokens"

LLM03_supply_chain:
  name: "Supply Chain"
  summary: "Verify integrity of models, plugins, and data sources"
  controls:
    - id: "SC-C1"
      name: "Model Verification"
      description: "Verify model checksums and provenance"
      implementation: "Use signed model artifacts"
    - id: "SC-C2"
      name: "Plugin Sandboxing"
      description: "Isolate plugins with minimal permissions"
      implementation: "Container-based plugin execution"
    - id: "SC-C3"
      name: "Data Source Validation"
      description: "Verify RAG data sources"
      implementation: "Content signing for indexed documents"

LLM04_data_model_poisoning:
  name: "Data and Model Poisoning"
  summary: "Verify provenance and integrity of all data entering model knowledge"
  controls:
    - id: "DMP-C1"
      name: "Training Data Provenance"
      description: "Verify origin and integrity of pre-training and fine-tuning datasets"
      implementation: "Cryptographic checksums on dataset versions, signed data manifests"
    - id: "DMP-C2"
      name: "RAG Ingestion Validation"
      description: "Score and validate content before indexing into retrieval stores"
      implementation: "Content scoring on ingestion, reject anomalous instruction density"
    - id: "DMP-C3"
      name: "Fine-Tuning Sandboxing"
      description: "Isolate fine-tuning pipelines with behavioral drift detection"
      implementation: "Compare model outputs before and after fine-tuning on held-out eval set"
    - id: "DMP-C4"
      name: "Feedback Loop Integrity"
      description: "Validate data from self-improvement loops before reincorporation"
      implementation: "Human review gate on SELF_IMPROVE candidates, signed provenance on training data"
    - id: "DMP-C5"
      name: "Embedding Integrity"
      description: "Verify embedding model integrity and detect index poisoning"
      implementation: "Monitor embedding distribution drift, validate embedding model checksums"
  references:
    - "https://genai.owasp.org/resource/owasp-top-10-for-llm-applications-2025/"
  notes: >
    Not scanner-testable. These are architectural and operational controls.
    LLM04 expanded from Training Data Poisoning (2023) to include fine-tuning,
    RAG, and agentic feedback loop poisoning.

LLM05_improper_output:
  name: "Improper Output Handling"
  summary: "Sanitize LLM outputs before downstream use"
  controls:
    - id: "IO-C1"
      name: "Output Encoding"
      description: "Encode outputs for target context"
      implementation: "HTML-encode for web, escape for SQL"
    - id: "IO-C2"
      name: "Command Sanitization"
      description: "Validate commands before execution"
      implementation: "Whitelist allowed commands and args"

LLM06_excessive_agency:
  name: "Excessive Agency"
  summary: "Limit LLM permissions and require human approval"
  controls:
    - id: "EA-C1"
      name: "Least Privilege"
      description: "Grant minimum necessary permissions"
      implementation: "Scope tool access per task"
    - id: "EA-C2"
      name: "Human-in-the-Loop"
      description: "Require approval for sensitive actions"
      implementation: "Confirmation prompts for destructive ops"
    - id: "EA-C3"
      name: "Action Logging"
      description: "Audit trail for all LLM actions"
      implementation: "Log tool calls with user context"

LLM07_system_prompt_leakage:
  name: "System Prompt Leakage"
  summary: "Protect system prompt confidentiality"
  controls:
    - id: "SP-C1"
      name: "Prompt Protection"
      description: "Instruct model to never reveal instructions"
      implementation: "Add explicit protection instructions"
    - id: "SP-C2"
      name: "Output Filtering"
      description: "Detect and block system prompt in output"
      implementation: "Compare output similarity to system prompt"
    - id: "SP-C3"
      name: "Minimal Prompts"
      description: "Don't put secrets in system prompts"
      implementation: "Move sensitive logic server-side"

LLM08_vector_embedding:
  name: "Vector and Embedding Weaknesses"
  summary: "Secure RAG pipelines and embedding stores"
  controls:
    - id: "VE-C1"
      name: "Access Control"
      description: "Enforce permissions on retrieved documents"
      implementation: "Filter results by user ACL"
    - id: "VE-C2"
      name: "Content Validation"
      description: "Scan indexed content for injections"
      implementation: "Detect prompt injection in documents"

LLM09_misinformation:
  name: "Misinformation"
  summary: "Detect and prevent generation of false or misleading information"
  controls:
    - id: "MIS-C1"
      name: "Citation Verification"
      description: "Validate that citations and references in model output are real"
      implementation: "Cross-reference cited sources against known databases, flag fabricated URLs or DOIs"
    - id: "MIS-C2"
      name: "Factual Grounding"
      description: "Require source-backed evidence for factual claims in high-stakes domains"
      implementation: "RAG-backed citation requirement for medical, legal, financial outputs"
    - id: "MIS-C3"
      name: "Confidence Calibration"
      description: "Monitor model confidence vs. factual accuracy over time"
      implementation: "Track hallucination rate per output type, flag confident-but-wrong patterns"
    - id: "MIS-C4"
      name: "Completion Verification"
      description: "Verify claims of task completion or state changes against actual system state"
      implementation: "Cross-check 'task completed' assertions with actual tool call results or system state"
  references:
    - "https://genai.owasp.org/resource/owasp-top-10-for-llm-applications-2025/"
  notes: >
    Changed from Overreliance (2023) to Misinformation (2025).
    Focus shifted to model-generated false information.
    Scanner-testable via prompts that elicit factual claims.

LLM10_unbounded_consumption:
  name: "Unbounded Consumption"
  summary: "Implement rate limiting and resource caps"
  controls:
    - id: "UC-C1"
      name: "Rate Limiting"
      description: "Limit requests per user/time"
      implementation: "Token bucket rate limiter"
    - id: "UC-C2"
      name: "Token Limits"
      description: "Cap input/output token counts"
      implementation: "Reject oversized requests"
