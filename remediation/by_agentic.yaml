# Remediation by OWASP Agentic Top 10 2026
# Defensive guidance for agentic AI security risks

version: "1.0.0"
updated: "2026-04-24"

ASI01_agent_goal_hijack:
  name: "Agent Goal Hijack"
  summary: "Prevent adversarial redirection of agent objectives"
  controls:
    - id: "AGH-C1"
      name: "Goal Anchoring"
      description: "Maintain immutable task scope from initialization"
      implementation: "Record original user intent at session start; flag deviations"
    - id: "AGH-C2"
      name: "Instruction Hierarchy"
      description: "System instructions always override user input"
      implementation: "Enforce system > user > tool output priority in context"
    - id: "AGH-C3"
      name: "Goal Drift Detection"
      description: "Monitor for incremental objective changes across turns"
      implementation: "Compare current task scope against original intent each turn"

ASI02_tool_misuse:
  name: "Tool Misuse and Exploitation"
  summary: "Prevent agents from misusing legitimate tools"
  controls:
    - id: "TM-C1"
      name: "Tool Scope Enforcement"
      description: "Whitelist available tools per agent at initialization"
      implementation: "Reject tool calls not in the agent's declared capability set"
    - id: "TM-C2"
      name: "Parameter Validation"
      description: "Validate tool call parameters against declared schema"
      implementation: "Check parameter types, ranges, and allowed values before dispatch"
    - id: "TM-C3"
      name: "Outcome-Level Authorization"
      description: "Evaluate cumulative tool call outcomes, not just individual calls"
      implementation: "Track effective privilege level across sequential tool calls"

ASI03_identity_privilege:
  name: "Identity and Privilege Abuse"
  summary: "Prevent exploitation of agent identity and privilege delegation"
  controls:
    - id: "IP-C1"
      name: "Agent Identity Separation"
      description: "Each agent has its own credential scope"
      implementation: "Per-agent service accounts with minimum necessary permissions"
    - id: "IP-C2"
      name: "Delegation Constraints"
      description: "Delegated privileges cannot exceed delegator's privileges"
      implementation: "Enforce privilege ceiling on delegation; no transitive escalation"
    - id: "IP-C3"
      name: "Session-Scoped Authorization"
      description: "Re-validate authorization at each privileged action"
      implementation: "No cached authorization; fresh validation per action"

ASI04_supply_chain:
  name: "Agentic Supply Chain Vulnerabilities"
  summary: "Secure dynamically loaded agent components"
  controls:
    - id: "ASC-C1"
      name: "Tool Registry Pinning"
      description: "Pin tool definitions and detect changes"
      implementation: "Hash-pin tool schemas; alert on any modification"
    - id: "ASC-C2"
      name: "Skill Verification"
      description: "Only load skills from verified registries"
      implementation: "Require signed packages from approved sources"
    - id: "ASC-C3"
      name: "Runtime Component Isolation"
      description: "Sandbox all dynamically loaded components"
      implementation: "Container-based isolation for plugins and connectors"

ASI05_code_execution:
  name: "Unexpected Code Execution"
  summary: "Prevent agent-mediated arbitrary code execution"
  controls:
    - id: "UCE-C1"
      name: "Execution Sandboxing"
      description: "All code execution runs in isolated sandboxes"
      implementation: "Container-based execution with no host access by default"
    - id: "UCE-C2"
      name: "Command Allowlisting"
      description: "Only permit pre-approved commands"
      implementation: "Whitelist of allowed commands; deny all others"
    - id: "UCE-C3"
      name: "No Fetch-and-Execute"
      description: "Never pipe fetched content to execution"
      implementation: "Block URL-to-interpreter patterns at the proxy layer"

ASI06_memory_poisoning:
  name: "Memory & Context Poisoning"
  summary: "Protect agent memory and context integrity"
  controls:
    - id: "MCP-C1"
      name: "Memory Provenance Tagging"
      description: "Tag all memory writes with source and trust level"
      implementation: "Memory entries carry source labels; user input tagged as untrusted"
    - id: "MCP-C2"
      name: "Memory Expiration"
      description: "Time-bound memory entries with automatic expiration"
      implementation: "TTL on stored context; force re-validation after expiry"
    - id: "MCP-C3"
      name: "Session Isolation"
      description: "No memory sharing across users or sessions"
      implementation: "Per-user, per-session memory stores with strict isolation"

ASI07_inter_agent:
  name: "Insecure Inter-Agent Communication"
  summary: "Secure communication between agents"
  controls:
    - id: "IAC-C1"
      name: "Message Signing"
      description: "Sign inter-agent messages cryptographically"
      implementation: "ECDSA or HMAC signing on all agent-to-agent messages"
    - id: "IAC-C2"
      name: "Identity Verification"
      description: "Verify sender identity independently"
      implementation: "Each agent verifies peer identity with the orchestrator"
    - id: "IAC-C3"
      name: "Delegation Integrity"
      description: "Delegation messages include scope hash"
      implementation: "Include integrity hash of original task scope; reject amendments without re-auth"

ASI08_cascading_failures:
  name: "Cascading Failures"
  summary: "Prevent fault propagation across agent systems"
  controls:
    - id: "CF-C1"
      name: "Circuit Breakers"
      description: "Halt propagation when error rates exceed threshold"
      implementation: "Per-agent circuit breaker with configurable error threshold"
    - id: "CF-C2"
      name: "Blast Radius Limits"
      description: "Bound the scope of any single agent's actions"
      implementation: "Maximum action count per session; maximum downstream spawn depth"
    - id: "CF-C3"
      name: "Rollback Capability"
      description: "Ability to undo recent agent actions"
      implementation: "Transaction log with rollback for reversible operations"

ASI09_human_trust:
  name: "Human-Agent Trust Exploitation"
  summary: "Protect humans from being manipulated by agent output"
  controls:
    - id: "HTE-C1"
      name: "Transparent Approval"
      description: "Approval UI shows actual operation, not agent description"
      implementation: "Derive approval text from tool call parameters; show both"
    - id: "HTE-C2"
      name: "Independent Verification"
      description: "Critical actions verified through separate channel"
      implementation: "Out-of-band verification for destructive operations"
    - id: "HTE-C3"
      name: "Urgency Dampening"
      description: "Time-pressure requests trigger more review, not less"
      implementation: "Flag urgent requests for additional human review"

ASI10_rogue_agents:
  name: "Rogue Agents"
  summary: "Detect and contain agents with compromised behavioral integrity"
  controls:
    - id: "RA-C1"
      name: "Behavioral Monitoring"
      description: "Monitor agent actions against expected behavioral profile"
      implementation: "Statistical baseline of normal agent behavior; alert on deviation"
    - id: "RA-C2"
      name: "Capability Ceiling"
      description: "Hard limit on agent capabilities regardless of context"
      implementation: "Infrastructure-enforced capability ceiling; agent cannot self-modify"
    - id: "RA-C3"
      name: "Kill Switch"
      description: "Immediate termination capability for rogue agents"
      implementation: "Orchestrator-controlled kill switch with session rollback"
